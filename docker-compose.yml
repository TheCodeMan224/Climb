# Orquestación local: PostgreSQL + API (FastAPI) + Frontend (Next.js).
# La app Flet fue jubilada; el backend es ahora solo la API.
services:
  db:
    image: postgres:16-alpine
    container_name: climb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: climb_dev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climb_dev_password}
      POSTGRES_DB: climb_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climb_dev -d climb_development"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    container_name: climb_api
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"           # API REST (FastAPI)
    volumes:
      - ./backend:/app
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://climb_dev:${POSTGRES_PASSWORD:-climb_dev_password}@db:5432/climb_development
      CORS_ORIGINS: http://localhost:3000
    env_file:
      - .env                  # ANTHROPIC_API_KEY, SMTP_USER, SMTP_APP_PASSWORD, SMTP_FROM
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: climb_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"           # Next.js
    volumes:
      - ./frontend:/app
      - /app/node_modules     # preserva node_modules del contenedor
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  postgres_data:
